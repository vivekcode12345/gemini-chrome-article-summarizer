<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Summary</title>

<style>
body{
    width:420px;
    padding:15px;
    font-family:Arial,Helvetica,sans-serif;
    background:#f5f5f5;
}

h2{
    text-align:center;
    margin-bottom:15px;
}

select,
button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:6px;
    border:none;
    font-size:15px;
}

button{
    cursor:pointer;
    background:#4285f4;
    color:white;
    font-weight:bold;
}

button:hover{
    background:#1a73e8;
}

#copy-btn{
    background:#34a853;
}

#copy-btn:hover{
    background:#2d8d46;
}

#result{
    margin-top:15px;
    padding:12px;
    min-height:180px;
    max-height:350px;
    overflow:auto;
    background:white;
    border-radius:6px;
    border:1px solid #ddd;
    white-space:pre-wrap;
}

.loader{
    text-align:center;
    color:#666;
    font-weight:bold;
}
</style>

</head>

<body>

<h2>🤖 AI Article Summary</h2>

<select id="summary-type">
    <option value="brief">Brief Summary</option>
    <option value="detailed">Detailed Summary</option>
    <option value="bullets">Bullet Points</option>
</select>

<button id="summarize">
Summarize This Page
</button>

<button id="copy-btn">
Copy Summary
</button>

<div id="result">
Click on <b>Summarize This Page</b> to generate the summary.
</div>

<script src="popup.js"></script>

</body>
</html>
